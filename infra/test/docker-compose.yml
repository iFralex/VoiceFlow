version: '3.9'

# Dedicated test database for integration tests.
# Usage:
#   docker compose -f infra/test/docker-compose.yml up -d
#   TEST_DATABASE_URL=postgresql://postgres:postgres@localhost:5433/vox_auto_test pnpm test:integration
#   docker compose -f infra/test/docker-compose.yml down -v

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vox_auto_test
    ports:
      - '5433:5432'
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_test_data:
