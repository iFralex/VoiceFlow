# Supabase local development configuration
# Mirrors the settings applied to the cloud projects (VoiceFlow-dev, VoiceFlow-staging, VoiceFlow-prod).
# Run `supabase start` to spin up a local Postgres 16 + Auth + Storage stack.
# See docs/infra/supabase-setup.md for cloud provisioning instructions.

project_id = "voiceflow"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 16

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
# Default file size limit; per-bucket overrides are applied via SQL policy (see 0004_storage_policies.sql).
file_size_limit = "500MiB"

[auth]
enabled = true
# Redirect URL for magic link / OTP flows in local dev.
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000",
  # Populate with production and staging URLs after cloud projects are created:
  # "https://voiceflow.example.com",
  # "https://staging.voiceflow.example.com",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
# Disable anonymous sign-ins; all users must be invited.
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
# Magic link / OTP settings per spec §14.3: 30 minutes, 6-digit code.
otp_expiry = 1800
otp_length = 6
# Template language: Italian — actual template content is set in cloud dashboard
# (see docs/infra/supabase-setup.md for template text).

# Phone auth is disabled for Phase 1.
[auth.sms]
enable_signup = false
enable_confirmations = false

# No third-party OAuth providers in Phase 1.
# [auth.external.google]
# enabled = false

[edge_runtime]
enabled = false

[analytics]
enabled = false
